<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>IDM 3D Scrollytelling</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        body { margin: 0; background: #111; overflow-x: hidden; color: white; font-family: sans-serif; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 1; }
        .content { position: relative; z-index: 2; pointer-events: none; }
        section { height: 100vh; display: flex; align-items: center; padding-left: 5%; }
        .card { background: rgba(0,0,0,0.8); padding: 20px; border-left: 4px solid #007bff; max-width: 350px; pointer-events: all; }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="content">
    <section><div class="card"><h2>IDM 63 Teslimat</h2><p>Parçalar dünyanın her yerine güvenle ulaşır.</p></div></section>
    <section><div class="card"><h2>Kare Bıçaklar</h2><p>Hassas karbür kesim teknolojisi.</p></div></section>
    <section><div class="card"><h2>Alt Bıçaklar</h2><p>Dayanıklılık ve güç bir arada.</p></div></section>
</div>

<script>
    gsap.registerPlugin(ScrollTrigger);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // AYDINLATMA (Her açıyı gör)
    scene.add(new THREE.AmbientLight(0xffffff, 2.5));
    const sun = new THREE.DirectionalLight(0xffffff, 3);
    sun.position.set(5, 10, 7);
    scene.add(sun);

    // KUTU VE RESİMLER
    const tLoader = new THREE.TextureLoader();
    const boxMat = new THREE.MeshBasicMaterial({ color: 0x555555 }); // Resim gelene kadar gri
    
    const texKapali = tLoader.load('kapalikutu.jpeg');
    const texKare = tLoader.load('karebicakkutu.jpeg');
    const texAlt = tLoader.load('altbicakkutu.jpeg');
    boxMat.map = texKapali;

    const box = new THREE.Mesh(new THREE.BoxGeometry(4, 2.8, 2.8), boxMat);
    scene.add(box);

    // MODELLER
    const loader = new THREE.GLTFLoader();
    const draco = new THREE.DRACOLoader();
    draco.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
    loader.setDRACOLoader(draco);

    function setupPart(url, sectionIdx) {
        loader.load(url, (gltf) => {
            const model = gltf.scene;
            
            // Merkeze hizalama (SolidWorks kaymasını düzeltir)
            const b = new THREE.Box3().setFromObject(model);
            const center = b.getCenter(new THREE.Vector3());
            model.position.sub(center);

            const group = new THREE.Group();
            group.add(model);
            scene.add(group);

            group.scale.set(30, 30, 30); // Boyutu büyüttük
            group.position.set(0, -12, 3); // Başlangıç pozisyonu (aşağıda)

            gsap.to(group.position, {
                y: 1.5,
                scrollTrigger: {
                    trigger: `.content section:nth-child(${sectionIdx})`,
                    scrub: 1,
                    start: "top bottom",
                    end: "top top"
                }
            });
        });
    }

    setupPart('karebicak.glb', 2);
    setupPart('sabitkucuk.glb', 3);

    // Kutu Görsel Değişimi
    ScrollTrigger.create({
        trigger: ".content section:nth-child(2)",
        onEnter: () => boxMat.map = texKare,
        onLeaveBack: () => boxMat.map = texKapali
    });
    ScrollTrigger.create({
        trigger: ".content section:nth-child(3)",
        onEnter: () => boxMat.map = texAlt,
        onLeaveBack: () => boxMat.map = texKare
    });

    // Kutu Dönüşü
    gsap.to(box.rotation, {
        y: Math.PI * 2,
        scrollTrigger: {
            trigger: ".content",
            scrub: 1,
            start: "top top",
            end: "bottom bottom"
        }
    });

    camera.position.set(0, 2, 12);

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
